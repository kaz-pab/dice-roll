<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Dice</title>
    <style>
        /* Theme Definitions */
        :root {
            /* Default: Classic Plastic */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #666666;
            --accent: #3b82f6;
            --accent-active: #2563eb;
            --combo-color: #22c55e;
            --history-bg: #252525;
            --border-color: #333;
            --btn-text: #ffffff;
            --shadow-color: #1d4ed8;
            --input-bg: #252525;
        }

        body.theme-bronze {
            --bg-color: #0f0e0d;
            --card-bg: #1a1816;
            --text-main: #f4ece4;
            --text-muted: #8c7a6b;
            --accent: #cd7f32;
            --accent-active: #b87333;
            --combo-color: #e6b31e;
            --history-bg: #2d2621;
            --border-color: #3d352e;
            --btn-text: #1a1816;
            --shadow-color: #7a4a1d;
            --input-bg: #25211e;
        }

        body.theme-neon {
            --bg-color: #080c0c; /* BG Token */
            --card-bg: #0f1919; /* SURFACE Token */
            --text-main: #c8fff4; /* FONT Token */
            --text-muted: #1a2e2e; 
            --accent: #00ff9f; /* BUTTON Token */
            --accent-active: #00d685;
            --combo-color: #ff3cac; /* ACCENT Token */
            --history-bg: #162626;
            --border-color: #00ff9f44;
            --btn-text: #080c0c; /* Contrast for bright green buttons */
            --shadow-color: #00ff9f;
            --input-bg: #080c0c;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            cursor: pointer;
        }

        #formula {
            font-size: 1.1rem;
            color: var(--combo-color);
            font-weight: bold;
            height: 1.5rem;
            margin-bottom: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
        }

        #formula.visible {
            opacity: 1;
        }

        #rollResult {
            font-size: clamp(6rem, 25vw, 12rem);
            font-weight: 900;
            color: var(--text-muted);
            transition: all 0.1s ease-out;
            user-select: none;
            line-height: 1;
        }

        #rollResult.active {
            color: var(--text-main);
            text-shadow: 0 0 25px var(--accent);
        }

        #rollResult.combo-active {
            color: var(--combo-color);
            text-shadow: 0 0 25px var(--combo-color);
        }

        .current-set-area {
            height: 3rem;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 0 1rem;
            margin-top: 1rem;
        }

        .die-val {
            background: var(--history-bg);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--accent);
            border: 1px solid var(--border-color);
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.theme-neon .die-val {
            color: var(--text-main);
            box-shadow: 0 0 8px var(--accent);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .controls {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            padding-bottom: 60px; 
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            padding-left: 0.5rem;
        }

        body.theme-neon label {
            color: var(--accent);
            opacity: 0.7;
        }

        select {
            appearance: none;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 1rem;
            font-size: 1.1rem;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            text-align: center;
            outline: none;
        }

        select option {
            background-color: var(--card-bg);
            color: var(--text-main);
        }

        button {
            background: var(--accent);
            color: var(--btn-text);
            border: none;
            padding: 1.2rem;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 4px 0px var(--shadow-color);
            margin-top: 0.5rem;
            min-height: 4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        body.theme-neon button {
            box-shadow: 0 0 15px var(--accent);
        }

        button.combo {
            background: var(--combo-color);
            box-shadow: 0 4px 0px var(--combo-active);
        }

        body.theme-neon button.combo {
            background: var(--combo-color);
            color: #fff;
            box-shadow: 0 0 15px var(--combo-color);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px var(--shadow-color) !important;
            filter: brightness(1.1);
        }

        .shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

    </style>
</head>
<body class="theme-classic">
    <div class="display-area" id="themeCycler">
        <div id="formula"></div>
        <div id="rollResult">d?</div>
        <div id="currentSet" class="current-set-area"></div>
    </div>

    <div class="controls">
        <div class="input-group">
            <label for="diceSelect">Select Dice</label>
            <select id="diceSelect">
                <option value="20">D20</option>
                <option value="12">D12</option>
                <option value="10">D10</option>
                <option value="8">D8</option>
                <option value="6">D6</option>
                <option value="4">D4</option>
                <option value="100">D100</option>
            </select>
        </div>

        <button id="rollBtn">ROLL!</button>
    </div>

    <script>
        const rollBtn = document.getElementById('rollBtn');
        const display = document.getElementById('rollResult');
        const formulaDisplay = document.getElementById('formula');
        const diceSelect = document.getElementById('diceSelect');
        const setDisplay = document.getElementById('currentSet');
        const themeCycler = document.getElementById('themeCycler');

        let comboTotal = 0;
        let comboCount = 0;
        let comboTimer = null;
        let countdownInterval = null;
        const COMBO_TIMEOUT = 3000; 

        // Theme Cycling Logic
        const themes = ['theme-classic', 'theme-bronze', 'theme-neon'];
        let currentThemeIndex = 1; 

        themeCycler.addEventListener('click', (e) => {
            if (e.target.closest('.die-val')) return;
            
            document.body.classList.remove(themes[currentThemeIndex]);
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            if (themes[currentThemeIndex] !== 'theme-classic') {
                document.body.classList.add(themes[currentThemeIndex]);
            }

            if (window.navigator.vibrate) window.navigator.vibrate(10);
        });

        function updateButtonLabel(timeLeftMs) {
            const baseText = "ROLL!";
            
            if (timeLeftMs === null) {
                rollBtn.innerText = baseText;
                return;
            }

            let arrows = "";
            if (timeLeftMs > 2000) arrows = ">>>";
            else if (timeLeftMs > 1000) arrows = ">>";
            else arrows = ">";
            
            const reverseArrows = arrows.split('').map(c => c === '>' ? '<' : c).join('');
            rollBtn.innerText = `${arrows} ${baseText} ${reverseArrows}`;
        }

        function startCountdown() {
            let startTime = Date.now();
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let remaining = COMBO_TIMEOUT - elapsed;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    resetComboState();
                } else {
                    updateButtonLabel(remaining);
                }
            }, 100);
        }

        function resetComboState() {
            comboTotal = 0;
            comboCount = 0;
            if (comboTimer) clearTimeout(comboTimer);
            if (countdownInterval) clearInterval(countdownInterval);
            comboTimer = null;
            countdownInterval = null;
            rollBtn.classList.remove('combo');
            formulaDisplay.classList.remove('visible');
            display.classList.remove('combo-active');
            updateButtonLabel(null);
        }

        diceSelect.addEventListener('change', () => {
            resetComboState();
            setDisplay.innerHTML = '';
            display.innerText = 'd?';
            display.classList.remove('active');
        });

        rollBtn.addEventListener('click', () => {
            const max = parseInt(diceSelect.value);
            if (!comboTimer) {
                setDisplay.innerHTML = '';
                comboTotal = 0;
                comboCount = 0;
            }
            if (comboTimer) clearTimeout(comboTimer);
            if (countdownInterval) clearInterval(countdownInterval);

            display.classList.remove('active', 'shake', 'combo-active');
            void display.offsetWidth; 
            display.classList.add('shake');
            rollBtn.classList.add('combo');
            updateButtonLabel(3000);

            let counter = 0;
            const interval = setInterval(() => {
                const tempRoll = Math.floor(Math.random() * max) + 1;
                display.innerText = comboTotal + tempRoll;
                counter++;
                if (counter > 4) {
                    clearInterval(interval);
                    finalizeRoll(max);
                }
            }, 30);
        });

        function finalizeRoll(max) {
            const newRoll = Math.floor(Math.random() * max) + 1;
            comboTotal += newRoll;
            comboCount++;

            const pill = document.createElement('div');
            pill.className = 'die-val';
            pill.innerText = newRoll;
            setDisplay.appendChild(pill);

            display.innerText = comboTotal;
            if (comboCount > 1) {
                display.classList.add('combo-active');
                formulaDisplay.innerText = `${comboCount} x D${max}`;
                formulaDisplay.classList.add('visible');
            } else {
                display.classList.add('active');
            }
            
            startCountdown();
            comboTimer = setTimeout(() => { resetComboState(); }, COMBO_TIMEOUT);

            if (window.navigator.vibrate) {
                window.navigator.vibrate(comboCount > 1 ? [40, 30, 40] : 50);
            }
        }
    </script>
</body>
</html>
